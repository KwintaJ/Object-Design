<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Administracyjny - SuperOgród</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-danger mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">[ADMIN] SuperOgród [ADMIN]</a>
        <div class="navbar-nav">
            <a class="nav-link text-white" href="index.html">Powrót do sklepu</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="card shadow mb-5">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Zarządzanie Kategoriami</h5>
            <button class="btn btn-sm btn-success" onclick="openCategoryModal()">+ Dodaj Kategorię</button>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>ID</th><th>Nazwa</th><th class="text-end">Akcje</th></tr>
                </thead>
                <tbody id="admin-category-list"></tbody>
            </table>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Zarządzanie Produktami</h5>
            <button class="btn btn-sm btn-success" onclick="openProductModal()">+ Dodaj Produkt</button>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>ID</th><th>Nazwa</th><th>Cena</th><th>Kategoria</th><th class="text-end">Akcje</th></tr>
                </thead>
                <tbody id="admin-products-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="catModalTitle">Kategoria</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="cat-id">
                <div class="mb-3">
                    <label class="form-label">Nazwa Kategorii</label>
                    <input type="text" id="cat-name" class="form-control" placeholder="np. Narzędzia">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveCategory()">Zapisz</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="prodModalTitle">Produkt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="prod-id">
                <div class="mb-3">
                    <label class="form-label">Nazwa Produktu</label>
                    <input type="text" id="prod-name" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Cena (zł)</label>
                    <input type="number" id="prod-price" class="form-control" step="0.01">
                </div>
                <div class="mb-3">
                    <label class="form-label">Kategoria</label>
                    <select id="prod-category" class="form-select"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveProduct()">Zapisz</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8000/api';
    let catModal, prodModal;

    document.addEventListener('DOMContentLoaded', () => {
        catModal = new bootstrap.Modal(document.getElementById('categoryModal'));
        prodModal = new bootstrap.Modal(document.getElementById('productModal'));
        loadAll();
    });

    async function loadAll() {
        await loadCategories();
        await loadProducts();
    }

    // --- KATEGORIE ---
    async function loadCategories() {
        const res = await fetch(`${API_URL}/category`);
        const data = await res.json();
        const list = document.getElementById('admin-category-list');
        const select = document.getElementById('prod-category');
        
        list.innerHTML = data.map(c => `
            <tr>
                <td>${c.id}</td><td>${c.name}</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-info" onclick="editCategory(${c.id}, '${c.name}')">Edytuj</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('category', ${c.id})">Usuń</button>
                </td>
            </tr>`).join('');

        select.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function openCategoryModal() {
        document.getElementById('cat-id').value = '';
        document.getElementById('cat-name').value = '';
        document.getElementById('catModalTitle').innerText = "Dodaj nową kategorię";
        catModal.show();
    }

    function editCategory(id, name) {
        document.getElementById('cat-id').value = id;
        document.getElementById('cat-name').value = name;
        document.getElementById('catModalTitle').innerText = "Edytuj kategorię";
        catModal.show();
    }

    async function saveCategory() {
        const id = document.getElementById('cat-id').value;
        const name = document.getElementById('cat-name').value;
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/category/${id}` : `${API_URL}/category`;

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name })
        });
        catModal.hide();
        loadAll();
    }

    // --- PRODUKTY ---
    async function loadProducts() {
        const res = await fetch(`${API_URL}/products`);
        const data = await res.json();
        const list = document.getElementById('admin-products-list');
        
        list.innerHTML = data.map(p => `
            <tr>
                <td>${p.id}</td><td>${p.name}</td><td>${p.price} zł</td>
                <td><span class="badge bg-secondary">${p.category ? p.category.name : 'Brak'}</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-info" onclick="editProduct(${p.id}, '${p.name}', ${p.price}, ${p.category?.id})">Edytuj</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('products', ${p.id})">Usuń</button>
                </td>
            </tr>`).join('');
    }

    function openProductModal() {
        document.getElementById('prod-id').value = '';
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-price').value = '';
        document.getElementById('prodModalTitle').innerText = "Dodaj nowy produkt";
        prodModal.show();
    }

    function editProduct(id, name, price, catId) {
        document.getElementById('prod-id').value = id;
        document.getElementById('prod-name').value = name;
        document.getElementById('prod-price').value = price;
        document.getElementById('prod-category').value = catId || '';
        document.getElementById('prodModalTitle').innerText = "Edytuj produkt";
        prodModal.show();
    }

    async function saveProduct() {
        const id = document.getElementById('prod-id').value;
        const body = {
            name: document.getElementById('prod-name').value,
            price: parseFloat(document.getElementById('prod-price').value),
            category: parseInt(document.getElementById('prod-category').value)
        };
        
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/products/${id}` : `${API_URL}/products`;

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        prodModal.hide();
        loadAll();
    }

    // --- USUWANIE ---
    async function deleteItem(type, id) {
        if(confirm('Czy na pewno chcesz usunąć ten rekord?')) {
            await fetch(`${API_URL}/${type}/${id}`, { method: 'DELETE' });
            loadAll();
        }
    }
</script>
</body>
</html>
