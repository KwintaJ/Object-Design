<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8"><title>Twój Koszyk - SuperOgród</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">SuperOgród</a>
            <div class="navbar-nav"><a class="nav-link" href="categories.html">Kategorie</a><a class="nav-link active" href="cart.html">Koszyk</a></div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-warning fw-bold text-dark fs-4">Twój Koszyk</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Produkt</th><th class="text-center">Ilość</th><th>Suma</th><th>Akcja</th></tr>
                    </thead>
                    <tbody id="cart-items"></tbody>
                </table>
            </div>
            <div class="card-footer text-end">
                <h3>Suma do zapłaty: <span id="cart-total" class="text-success">0.00 zł</span></h3>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/cart';

        async function loadCart() {
            const res = await fetch(API_URL);
            const items = await res.json();
            const container = document.getElementById('cart-items');
            let total = 0;

            container.innerHTML = items.map(item => {
                const subtotal = item.quantity * item.product.price;
                total += subtotal;
                return `
                <tr>
                    <td><strong>${item.product.name}</strong><br><small class="text-muted">${item.product.price} zł / szt.</small></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${item.id}, ${item.quantity - 1})">-</button>
                        <span class="mx-3 fw-bold">${item.quantity}</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                    </td>
                    <td>${subtotal.toFixed(2)} zł</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Usuń</button></td>
                </tr>`;
            }).join('');
            document.getElementById('cart-total').innerText = total.toFixed(2) + " zł";
        }

        async function updateQty(id, newQty) {
            if (newQty <= 0) return deleteItem(id);
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ quantity: newQty })
            });
            loadCart();
        }

        async function deleteItem(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadCart();
        }

        window.onload = loadCart;
    </script>
</body>
</html>
