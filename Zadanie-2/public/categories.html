<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8"><title>Kategorie - SuperOgród</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">SuperOgród</a>
            <div class="navbar-nav"><a class="nav-link active" href="categories.html">Kategorie</a><a class="nav-link" href="cart.html">Koszyk</a></div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Wybierz kategorię</h2>
        <div class="row" id="categories-grid"></div>
    </div>

    <script>
        async function loadCategories() {
            const res = await fetch('http://localhost:8000/api/category');
            const categories = await res.json();
            document.getElementById('categories-grid').innerHTML = categories.map(c => `
                <div class="col-md-6 mb-4">
                    <a href="index.html?category=${c.name}" class="text-decoration-none">
                        <div class="card bg-success text-white text-center p-5 shadow hover-shadow">
                            <h2 class="display-6">${c.name}</h2>
                        </div>
                    </a>
                </div>
            `).join('');
        }
        window.onload = loadCategories;
    </script>
</body>
</html>
